<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETR.IO 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .app {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid #1e1e1e;
        }

        .header-left h1 {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .header-left .subtitle {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .header-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-box {
            flex: 1;
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 10px;
            padding: 20px 24px;
        }

        .stat-box .value {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.2;
        }

        .stat-box .label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .toolbar .spacer {
            flex: 1;
        }

        .add-form {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
            padding: 4px 6px;
        }

        .add-form input {
            background: transparent;
            border: none;
            color: #e0e0e0;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
            width: 120px;
        }

        .add-form input::placeholder {
            color: #444;
        }

        .add-form input:focus {
            color: #ffffff;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #1e1e1e;
            border-radius: 6px;
            background: #141414;
            color: #ccc;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            line-height: 1;
        }

        .btn:hover {
            background: #1c1c1c;
            border-color: #333;
            color: #fff;
        }

        .btn:active {
            background: #222;
        }

        .btn-primary {
            background: #1a3a2a;
            border-color: #1e4a35;
            color: #4ade80;
        }

        .btn-primary:hover {
            background: #1e4a35;
            border-color: #2a6a4a;
            color: #6ee7a0;
        }

        .btn-danger {
            color: #f87171;
        }

        .btn-danger:hover {
            background: #2a1a1a;
            border-color: #4a2a2a;
            color: #fca5a5;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .card {
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #1a1a1a;
            background: #111;
        }

        tbody td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid #181818;
            vertical-align: middle;
        }

        tbody tr:hover td {
            background: #181818;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .rank-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rank-num {
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            background: #1a1a1a;
            color: #555;
        }

        .rank-num.top1 {
            background: #2a2410;
            color: #fbbf24;
        }

        .rank-num.top2 {
            background: #1a1a24;
            color: #9ca3af;
        }

        .rank-num.top3 {
            background: #241a14;
            color: #d97706;
        }

        .user-id {
            color: #555;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
        }

        .tetrio-id {
            font-weight: 600;
            color: #e0e0e0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .tr-value {
            color: #60a5fa;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .sprint-value {
            color: #fb7185;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-active {
            background: #0a2a1a;
            color: #4ade80;
            border: 1px solid #1a4a2a;
        }

        .badge-inactive {
            background: #1a1a1a;
            color: #555;
            border: 1px solid #222;
        }

        .actions-cell {
            display: flex;
            gap: 4px;
        }

        .actions-cell .btn {
            padding: 4px 10px;
            font-size: 11px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #444;
        }

        .empty-state .icon {
            font-size: 36px;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #141414;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            width: 90%;
            max-width: 680px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .modal-close {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .modal-close:hover {
            background: #1a1a1a;
            color: #fff;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .modal-body label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .import-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: #0f0f0f;
            border-radius: 6px;
            padding: 3px;
        }

        .import-tab {
            flex: 1;
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: #555;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.15s;
        }

        .import-tab.active {
            background: #1e1e1e;
            color: #e0e0e0;
        }

        .import-tab:hover:not(.active) {
            color: #888;
        }

        .drop-zone {
            border: 1px dashed #222;
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
        }

        .drop-zone:hover {
            border-color: #333;
            background: #181818;
        }

        .drop-zone .icon {
            font-size: 32px;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        .drop-zone p {
            font-size: 13px;
            color: #555;
        }

        .drop-zone .filename {
            color: #4ade80;
            margin-top: 8px;
            font-size: 13px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            border: 1px solid #1e1e1e;
            border-radius: 6px;
            color: #e0e0e0;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #333;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .import-result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
            line-height: 1.6;
        }

        .import-result.success {
            display: block;
            background: #0a2a1a;
            color: #4ade80;
            border: 1px solid #1a4a2a;
        }

        .import-result.error {
            display: block;
            background: #2a0a0a;
            color: #f87171;
            border: 1px solid #4a1a1a;
        }

        @media (max-width: 768px) {
            .app {
                padding: 16px 12px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .stats-row {
                flex-direction: column;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .add-form {
                width: 100%;
            }

            .add-form input {
                flex: 1;
            }

            .card {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-left">
                <h1>TETR.IO 管理后台</h1>
                <div class="subtitle">用户数据管理面板</div>
            </div>
            <div class="header-right">
                <button class="btn" onclick="loadData()">↻ 刷新</button>
            </div>
        </div>

        <div class="stats-row" id="stats-row">
            <div class="stat-box">
                <div class="value" id="stat-bound">-</div>
                <div class="label">已绑定</div>
            </div>
            <div class="stat-box">
                <div class="value" id="stat-active">-</div>
                <div class="label">已激活</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="add-form">
                <input type="text" id="add-user-id" placeholder="QQ号">
                <input type="text" id="add-tetrio-username" placeholder="TETR.IO 用户名">
                <button class="btn btn-primary" onclick="addUser()">添加</button>
            </div>
            <div class="spacer"></div>
            <button class="btn" onclick="openImportModal()">导入 JSON</button>
            <button class="btn" onclick="window.location.href='/api/export'">导出 JSON</button>
            <button class="btn btn-danger" onclick="resetAllStatus()">重置状态</button>
            <button class="btn btn-danger" onclick="clearAll()">清空数据</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">排名</th>
                        <th>用户</th>
                        <th>TETR.IO</th>
                        <th>TR</th>
                        <th>40L</th>
                        <th>状态</th>
                        <th style="width: 200px;">操作</th>
                    </tr>
                </thead>
                <tbody id="data-body">
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="import-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>导入 JSON 数据</h2>
                <button class="modal-close" onclick="closeImportModal()">✕</button>
            </div>
            <div class="modal-body">
                <label>导入方式</label>
                <div class="import-tabs">
                    <button class="import-tab active" onclick="switchImportTab(this, 'file')">文件上传</button>
                    <button class="import-tab" onclick="switchImportTab(this, 'text')">文本粘贴</button>
                </div>

                <div id="import-file-section">
                    <div class="drop-zone" onclick="document.getElementById('json-file').click()">
                        <input type="file" id="json-file" accept=".json" style="display:none" onchange="handleFileSelect(this)">
                        <div class="icon">📁</div>
                        <p>点击选择 JSON 文件</p>
                        <div class="filename" id="file-name"></div>
                    </div>
                </div>

                <div id="import-text-section" style="display:none;">
                    <textarea id="json-text" rows="8" placeholder="粘贴 JSON 数据..."></textarea>
                </div>

                <div class="import-result" id="import-result"></div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeImportModal()">取消</button>
                <button class="btn btn-primary" onclick="importJSON()">开始导入</button>
            </div>
        </div>
    </div>

    <script>
        let importMethod = 'file';

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('stat-bound').textContent = stats.bound_count;
                document.getElementById('stat-active').textContent = stats.registered_count;
            } catch (e) {
                console.error('loadStats error:', e);
            }
        }

        async function loadData() {
            try {
                await loadStats();

                const res = await fetch('/api/users');
                let users = await res.json();

                users.sort((a, b) => {
                    if (b.is_registered !== a.is_registered) {
                        return b.is_registered - a.is_registered;
                    }
                    return b.league_rating - a.league_rating;
                });

                const tbody = document.getElementById('data-body');
                tbody.innerHTML = '';

                let rank = 0;

                for (const user of users) {
                    const tr = document.createElement('tr');

                    let rankDisplay = '-';
                    let rankClass = '';
                    if (user.is_registered) {
                        rank++;
                        rankDisplay = rank;
                        if (rank === 1) rankClass = 'top1';
                        else if (rank === 2) rankClass = 'top2';
                        else if (rank === 3) rankClass = 'top3';
                    }

                    const trVal = user.league_rating === -1 ? 'N/A' : user.league_rating.toFixed(2);
                    const sprintVal = user.sprint_time === 9999.0 ? 'N/A' : user.sprint_time.toFixed(3) + 's';
                    const isActive = user.is_registered === 1;
                    const statusText = isActive ? '已激活' : '未激活';
                    const statusClass = isActive ? 'badge-active' : 'badge-inactive';

                    tr.innerHTML = `
                        <td><div class="rank-num ${rankClass}">${rankDisplay}</div></td>
                        <td><span class="user-id">${user.user_id}</span></td>
                        <td><span class="tetrio-id">${user.tetrio_id || '-'}</span></td>
                        <td><span class="tr-value">${trVal}</span></td>
                        <td><span class="sprint-value">${sprintVal}</span></td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div class="actions-cell">
                                <button class="btn btn-primary" onclick="setActive('${user.user_id}')">激活</button>
                                <button class="btn" onclick="setInactive('${user.user_id}')">停用</button>
                                <button class="btn btn-danger" onclick="deleteUser('${user.user_id}')">删除</button>
                            </div>
                        </td>
                    `;

                    tbody.appendChild(tr);
                }

                if (users.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <div class="icon">📋</div>
                                    <p>暂无用户数据</p>
                                </div>
                            </td>
                        </tr>
                    `;
                }

            } catch (e) {
                console.error('loadData error:', e);
            }
        }

        async function setActive(userId) {
            await fetch('/api/user/' + userId + '/status/1', { method: 'POST' });
            loadData();
        }

        async function setInactive(userId) {
            await fetch('/api/user/' + userId + '/status/0', { method: 'POST' });
            loadData();
        }

        async function deleteUser(userId) {
            if (!confirm('确定要删除该用户吗？')) return;
            await fetch('/api/user/' + userId, { method: 'DELETE' });
            loadData();
        }

        async function resetAllStatus() {
            if (!confirm('确定要清除所有用户的激活状态吗？即将自动导出备份。')) return;
            window.location.href = '/api/export';
            await new Promise(r => setTimeout(r, 1000));
            const res = await fetch('/api/users');
            const users = await res.json();
            for (const user of users) {
                await fetch('/api/user/' + user.user_id + '/status/0', { method: 'POST' });
            }
            loadData();
        }

        async function clearAll() {
            if (!confirm('确定要清空所有数据吗？即将自动导出备份。')) return;
            window.location.href = '/api/export';
            await new Promise(r => setTimeout(r, 1000));
            await fetch('/api/users', { method: 'DELETE' });
            loadData();
        }

        async function addUser() {
            const userId = document.getElementById('add-user-id').value.trim();
            const username = document.getElementById('add-tetrio-username').value.trim();
            if (!userId || !username) {
                alert('请填写 QQ 号和 TETR.IO 用户名');
                return;
            }
            const btn = document.querySelector('.add-form .btn-primary');
            btn.disabled = true;
            btn.textContent = '添加中...';
            try {
                const res = await fetch('/api/user/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, tetrio_username: username })
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('add-user-id').value = '';
                    document.getElementById('add-tetrio-username').value = '';
                    loadData();
                } else {
                    alert('添加失败: ' + (result.reason || '未知错误'));
                }
            } catch (e) {
                alert('添加失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '添加';
            }
        }

        function switchImportTab(el, method) {
            document.querySelectorAll('.import-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            importMethod = method;
            document.getElementById('import-file-section').style.display = method === 'file' ? 'block' : 'none';
            document.getElementById('import-text-section').style.display = method === 'text' ? 'block' : 'none';
        }

        function openImportModal() {
            document.getElementById('import-modal').classList.add('show');
            document.getElementById('json-file').value = '';
            document.getElementById('file-name').textContent = '';
            document.getElementById('json-text').value = '';
            document.getElementById('import-result').className = 'import-result';
        }

        function closeImportModal() {
            document.getElementById('import-modal').classList.remove('show');
        }

        function handleFileSelect(input) {
            const file = input.files[0];
            document.getElementById('file-name').textContent = file ? file.name : '';
        }

        async function importJSON() {
            let jsonData;
            try {
                if (importMethod === 'file') {
                    const input = document.getElementById('json-file');
                    if (!input.files || !input.files[0]) {
                        showImportResult('请选择一个 JSON 文件', 'error');
                        return;
                    }
                    const text = await input.files[0].text();
                    jsonData = JSON.parse(text);
                } else {
                    const text = document.getElementById('json-text').value.trim();
                    if (!text) {
                        showImportResult('请粘贴 JSON 文本', 'error');
                        return;
                    }
                    jsonData = JSON.parse(text);
                }

                if (!Array.isArray(jsonData)) {
                    showImportResult('JSON 数据必须是数组格式', 'error');
                    return;
                }

                const btn = document.querySelector('.modal-footer .btn-primary');
                btn.disabled = true;
                btn.textContent = '导入中...';

                const res = await fetch('/api/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(jsonData)
                });

                const result = await res.json();
                if (result.success) {
                    const r = result.result || {};
                    showImportResult(
                        '导入完成\n新增: ' + (r.imported || 0) + ' 条\n更新: ' + (r.updated || 0) + ' 条',
                        'success'
                    );
                    setTimeout(() => { closeImportModal(); loadData(); }, 1500);
                } else {
                    showImportResult('导入失败: ' + (result.reason || '未知错误'), 'error');
                }

                btn.disabled = false;
                btn.textContent = '开始导入';

            } catch (e) {
                showImportResult('数据解析失败: ' + e.message, 'error');
            }
        }

        function showImportResult(msg, type) {
            const el = document.getElementById('import-result');
            el.textContent = msg;
            el.className = 'import-result ' + type;
        }

        loadData();
    </script>
</body>
</html>
